<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bootstrap Site</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Text Addon -->
<div class="input-group mb-3">
    <span class="input-group-text">@</span>
    <input type="text" class="form-control" placeholder="Username">
</div>

<!-- Multiple Inputs -->
<div class="input-group mb-3">
    <span class="input-group-text">$</span>
    <input type="text" class="form-control" placeholder="Amount">
    <span class="input-group-text">.00</span>
</div>

<!-- Button Addon -->
<div class="input-group mb-3">
    <input type="text" class="form-control" placeholder="Search...">
    <button class="btn btn-primary" type="button">Go</button>
</div>

<!-- With Icon -->
<div class="input-group mb-3">
    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
    <input type="email" class="form-control" placeholder="Email">
</div>
<!-- Valid State -->
<div class="mb-3">
    <label class="form-label">Valid input</label>
    <input type="text" class="form-control is-valid" value="Correct!">
    <div class="valid-feedback">Looks good!</div>
</div>

<!-- Invalid State -->
<div class="mb-3">
    <label class="form-label">Invalid input</label>
    <input type="text" class="form-control is-invalid">
    <div class="invalid-feedback">Please provide a valid value.</div>
</div>
<!-- Basic Alerts -->
<div class="alert alert-success" role="alert">
    <strong>Success!</strong> Your action was completed.
</div>

<div class="alert alert-danger" role="alert">
    <strong>Error!</strong> Something went wrong.
</div>

<div class="alert alert-warning" role="alert">
    <strong>Warning!</strong> Please check your input.
</div>

<div class="alert alert-info" role="alert">
    <i class="bi bi-info-circle"></i> This is an info message.
</div>

<!-- Dismissible Alert -->
<div class="alert alert-warning alert-dismissible fade show" role="alert">
    <strong>Warning!</strong> This can be dismissed.
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- Alert with Link -->
<div class="alert alert-primary" role="alert">
    Check out this <a href="#" class="alert-link">important link</a>.
</div>
<!-- Button to trigger modal -->
<button type="button" class="btn btn-primary" 
        data-bs-toggle="modal" data-bs-target="#myModal">
    Open Modal
</button>

<!-- Modal Structure -->
<div class="modal fade" id="myModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <!-- Header -->
            <div class="modal-header">
                <h5 class="modal-title">Modal Title</h5>
                <button type="button" class="btn-close" 
                        data-bs-dismiss="modal"></button>
            </div>
            <!-- Body -->
            <div class="modal-body">
                <p>Modal body text goes here.</p>
            </div>
            <!-- Footer -->
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" 
                        data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary">
                    Save changes
                </button>
            </div>
        </div>
    </div>
</div>
    <!-- Bootstrap JS Bundle (Popper รวมอยู่ด้วย) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
